# brunnr Catalog
# Reference-first catalog for Pi (badlogic/pi-mono) — skills, agents, prompts, extensions, themes
# This file is the authoritative source of truth for what exists in the catalog

name: brunnr
description: Reference-first catalog for Pi — skills, agents, prompts, extensions, themes
version: "3.0.0"

# =============================================================================
# SOURCE SEMANTICS
# =============================================================================
# Each entry requires a 'source' field that defines where the content lives.
# Three source types are supported:
#
# 1. REPO-BACKED (default): Path within this brunnr repository
#    source: skills/my-skill/SKILL.md
#    - Content is stored in the brunnr repo
#    - Synced with git
#    - Use for team-vetted, versioned components
#
# 2. LOCAL REFERENCE: Absolute path on your machine
#    source: file:///Users/you/projects/shared-skills/my-skill/SKILL.md
#    - Content lives outside brunnr
#    - Not synced with brunnr git
#    - Use for personal components or external repos
#
# 3. REMOTE REFERENCE: GitHub blob/raw URL
#    source: https://raw.githubusercontent.com/org/repo/main/skills/my-skill/SKILL.md
#    - Content fetched on demand
#    - Not stored in brunnr
#    - Use for referencing external, published components
#
# =============================================================================
# REQUIRED FIELDS (per entry)
# =============================================================================
# - name: Unique identifier within the section
# - description: What this item does (one line)
# - source: Where to find the content (see semantics above)
#
# =============================================================================
# OPTIONAL METADATA
# =============================================================================
# - type: For prompts only — "single" (default) or "multi-agent"
# - install_to: Override default install path (rarely needed)
# - dependencies:
#     skills: [skill-name]      # Required skills
#     agents: [agent-name]      # Required agents
#     prompts: [prompt-name]    # Related prompts
# - origin: Where this came from (URL, author, etc.)
# - sync: "auto" | "manual" | "never" — how to handle updates
# - tags: [tag1, tag2] — for search and filtering

# =============================================================================
# SKILLS
# =============================================================================
# Skills are reusable capabilities with their own directory and SKILL.md file.
# Each skill directory may contain additional files (scripts, templates, etc.).
# Default install path: .pi/skills/<name>/   (Pi reads this natively;
#   ~/.agents/skills/ is also recognised as the Agent Skills standard path)
# =============================================================================
skills:
  # Example: Repo-backed skill (content stored in brunnr)
  - name: code-reviewer
    description: Review code for bugs, style, and best practices
    source: skills/code-reviewer/SKILL.md
    tags: [review, code-quality, security]
    dependencies:
      skills: []
      agents: []
    sync: auto

  # Example: Local reference skill (content outside brunnr)
  - name: my-local-skill
    description: Personal skill stored outside brunnr
    source: file:///Users/me/.local/share/brunnr-skills/my-skill/SKILL.md
    tags: [personal, experimental]
    sync: manual

# =============================================================================
# AGENTS
# =============================================================================
# Agents are specialized AI configurations stored as single markdown files.
# Default install path: .pi/agents/<name>.md
# =============================================================================
agents:
  - name: autoresearch
    description: Autonomous researcher — iteratively modifies a target, runs experiments, keeps only improvements; runs in a loop until stopped
    source: agents/autoresearch.md
    tags: [autonomous, experimentation, optimization, research]
    origin: https://github.com/karpathy/autoresearch
    dependencies:
      skills: []
      agents: []
    sync: auto

  - name: autoresearch-skill
    description: Autonomous skill optimizer — iteratively edits a SKILL.md against binary eval assertions, keeps only changes that improve pass rate. Stops at plateau with a diagnostic report.
    source: agents/autoresearch-skill.md
    tags: [autonomous, experimentation, optimization, skills, evals]
    origin: https://github.com/karpathy/autoresearch
    dependencies:
      skills: []
      agents: []
    sync: auto

  - name: autoresearch-skill-gepa
    description: GEPA-style skill optimizer — reflection on failing traces and Pareto front of candidates. Use when autoresearch-skill plateaus. More sample-efficient on hard skills, more expensive per experiment.
    source: agents/autoresearch-skill-gepa.md
    tags: [autonomous, experimentation, optimization, skills, evals, gepa, reflection]
    origin: https://github.com/gepa-ai/gepa
    dependencies:
      skills: []
      agents: []
    sync: auto

  - name: autoresearch-agent
    description: GEPA-style optimizer for agent .md files — reflection on full trajectory traces (tool calls, turn count, final state) plus a Pareto front. The right tool for agent prompts; skips the hill-climb stage that exists for skills.
    source: agents/autoresearch-agent.md
    tags: [autonomous, experimentation, optimization, agents, evals, gepa, reflection, trajectory]
    origin: https://github.com/gepa-ai/gepa
    dependencies:
      skills: []
      agents: []
    sync: auto

  - name: eval-designer
    description: Generates binary eval assertions for a skill — produces evals.json with deterministic checks and flagged semantic fallbacks
    source: agents/eval-designer.md
    tags: [evals, testing, skills, assertions, quality]
    dependencies:
      skills: []
      agents: []
    sync: auto

  - name: eval-designer-agent
    description: Generates trajectory-style binary evals for an agent .md file — fixtures, reset commands, turn caps, forbidden-tool checks, final-state assertions
    source: agents/eval-designer-agent.md
    tags: [evals, testing, agents, assertions, quality, trajectory]
    dependencies:
      skills: []
      agents: []
    sync: auto

  # Example: Repo-backed agent
  - name: security-auditor
    description: Audit code for security vulnerabilities
    source: agents/security-auditor.md
    tags: [security, audit, review]
    dependencies:
      skills: [code-reviewer]
      agents: []

  # Example: Remote reference agent
  - name: external-agent
    description: Reference to an agent from another repo
    source: https://raw.githubusercontent.com/org/ai-catalog/main/agents/docs-checker.md
    origin: https://github.com/org/ai-catalog
    tags: [external, documentation]
    sync: never

# =============================================================================
# PROMPTS
# =============================================================================
# Prompts are single-shot instructions or templates stored as markdown files.
# Multi-agent prompts use type: multi-agent and include orchestration logic.
# Default install path: .pi/prompts/<name>.md
# =============================================================================
prompts:
  - name: autoresearch
    description: Kick off an autonomous research session — collects params and starts the autoresearch agent loop
    source: prompts/autoresearch.md
    type: single
    tags: [autonomous, experimentation, optimization, research]
    origin: https://github.com/karpathy/autoresearch
    dependencies:
      skills: []
      agents: [autoresearch]
    sync: auto

  - name: autoresearch-skill
    description: Kick off an autonomous skill optimization session — collects params and starts the autoresearch-skill agent loop
    source: prompts/autoresearch-skill.md
    type: single
    tags: [autonomous, experimentation, optimization, skills, evals]
    dependencies:
      skills: []
      agents: [autoresearch-skill]
    sync: auto

  - name: autoresearch-skill-gepa
    description: Kick off GEPA-style skill optimization — uses reflection on failing eval traces and a Pareto front. Run when autoresearch-skill has plateaued.
    source: prompts/autoresearch-skill-gepa.md
    type: single
    tags: [autonomous, experimentation, optimization, skills, evals, gepa, reflection]
    dependencies:
      skills: []
      agents: [autoresearch-skill-gepa]
    sync: auto

  - name: autoresearch-pipeline
    description: Run the full skill-optimization pipeline — autoresearch-skill (hill-climb) → autoresearch-skill-gepa (reflection) → autoresearch-skill in delete-only mode (compaction) — with plateau-based escalation. One pass per epoch.
    source: prompts/autoresearch-pipeline.md
    type: multi-agent
    tags: [autonomous, optimization, skills, evals, pipeline, orchestration]
    dependencies:
      skills: []
      agents: [autoresearch-skill, autoresearch-skill-gepa]
    sync: auto

  - name: autoresearch-agent
    description: Kick off GEPA-style optimization for an agent .md file — reflection on trajectory traces and a Pareto front of candidates. Skips the hill-climb stage that exists for skills.
    source: prompts/autoresearch-agent.md
    type: single
    tags: [autonomous, experimentation, optimization, agents, evals, gepa, reflection, trajectory]
    dependencies:
      skills: []
      agents: [autoresearch-agent]
    sync: auto

  - name: gen-evals
    description: Generate binary eval assertions for a skill — creates evals.json before running autoresearch-skill
    source: prompts/gen-evals.md
    type: single
    tags: [evals, testing, skills, assertions, quality]
    dependencies:
      skills: []
      agents: [eval-designer]
    sync: auto

  - name: gen-evals-agent
    description: Generate trajectory-style binary evals for an agent .md file — fixtures, reset commands, turn caps, safety checks. Run before autoresearch-agent.
    source: prompts/gen-evals-agent.md
    type: single
    tags: [evals, testing, agents, assertions, quality, trajectory]
    dependencies:
      skills: []
      agents: [eval-designer-agent]
    sync: auto

  - name: fork-skill
    description: Fork an externally-referenced skill into the brunnr repo — converts remote or local reference to repo-backed for editing and optimization
    source: prompts/fork-skill.md
    type: single
    tags: [skills, fork, import, catalog]
    dependencies:
      skills: []
      agents: []
    sync: auto

  - name: fork-agent
    description: Fork an externally-referenced agent into the brunnr repo — converts remote or local reference to repo-backed for editing and optimization
    source: prompts/fork-agent.md
    type: single
    tags: [agents, fork, import, catalog]
    dependencies:
      skills: []
      agents: []
    sync: auto

  - name: skill-status
    description: Report which skills need optimization — scans evals.json history and ranks by staleness, pass rate, and run count. Use this to decide which skill to autoresearch next.
    source: prompts/skill-status.md
    type: single
    tags: [evals, optimization, skills, status, staleness]
    dependencies:
      skills: []
      agents: []
    sync: auto

  - name: agent-status
    description: Report which agents need optimization — scans evals.json history and ranks by safety violations, staleness, pass rate, and turn-count efficiency
    source: prompts/agent-status.md
    type: single
    tags: [evals, optimization, agents, status, staleness, safety]
    dependencies:
      skills: []
      agents: []
    sync: auto

  # Example: Single prompt (type defaults to "single")
  - name: pr-description
    description: Generate a pull request description from commits
    source: prompts/pr-description.md
    type: single
    tags: [git, documentation, pr]
    dependencies:
      skills: []
      agents: []

  # Example: Multi-agent prompt (orchestrated workflow)
  - name: complex-review
    description: Multi-agent code review with security, perf, and docs
    source: prompts/complex-review.md
    type: multi-agent
    tags: [review, multi-agent, orchestration]
    dependencies:
      skills: [code-reviewer]
      agents: [security-auditor]

  # Example: Local reference prompt
  - name: my-local-prompt
    description: Personal prompt stored outside brunnr
    source: file:///Users/me/.local/share/brunnr-prompts/daily-standup.md
    type: single
    tags: [personal, standup]
    sync: manual

# =============================================================================
# EXTENSIONS  (Pi-only)
# =============================================================================
# Pi extensions are TypeScript modules loaded by `pi -e <path>`. They register
# tools, commands, shortcuts, event handlers, and custom UI components.
#
# Extension entries can be EITHER a single file (e.g. `extensions/foo.ts`) or
# a directory (e.g. `extensions/foo/`). Directory-style packages ship the .ts
# alongside any extra runtime artefacts the extension needs at known paths.
#
# Default install convention (for directory-style extensions):
#   <source-dir>/<name>.ts        →  .pi/extensions/<name>.ts
#   <source-dir>/agents/<sub>/    →  .pi/agents/<sub>/
#   <source-dir>/themes/<sub>/    →  .pi/themes/<sub>/
#
# Override default install path via `install_to` if needed.
# =============================================================================
extensions:
  - name: eitri
    description: "Meta-agent that builds Pi agents — orchestrator + parallel/chain research across domain experts (extensions, themes, skills, settings, TUI, prompts, agents, keybindings, CLI). Hardened with ctx.signal abort handling, user/project agent scope split, truncateHead helper, theme-token UI, chain mode with {previous} substitution, usage stats, and a 4-way concurrency cap. Named after Eitri, the master dwarf smith of Norse myth — counterpart to brunnr (the well of wisdom the experts draw from)."
    source: extensions/eitri/
    tags: [meta-agent, parallel-research, smith, orchestrator]
    origin: https://github.com/badlogic/pi-vs-claude-code
    dependencies:
      skills: []
      agents: []
    sync: auto

# =============================================================================
# THEMES  (Pi-only)
# =============================================================================
# Pi themes are .json files defining all 51 colour tokens (core UI, markdown,
# syntax, tool diffs, thinking borders, bash mode). Hot-reloaded when the
# active theme file changes.
#
# Default install path: .pi/themes/<name>.json
# =============================================================================
themes: []
